<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - EcoSystem</title>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f9fafb;
            color: #111827;
            text-align: center;
            padding: 24px;
        }
        .card { max-width: 360px; }
        h1 { font-size: 1.25rem; margin-bottom: 8px; color: #991b1b; }
        p { color: #6b7280; font-size: 0.9rem; }
        button {
            margin-top: 16px;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #991b1b;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Anda sedang offline</h1>
        <p>Koneksi internet tidak tersedia. Periksa jaringan Anda dan coba lagi.</p>
        <button onclick="location.reload()">Coba Lagi</button>
    </div>
</body>
</html>
